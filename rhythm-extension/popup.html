<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --deep: #0d0f14;
      --ink: #1a1d24;
      --slate: #2c3040;
      --mist: #8a909e;
      --silver: #c4c9d4;
      --snow: #f0f2f5;
      --gold: #c9a96e;
      --gold-soft: rgba(201,169,110,0.12);
      --gold-line: rgba(201,169,110,0.3);
      --sage: #7fa888;
      --sage-soft: rgba(127,168,136,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: var(--deep);
      color: var(--snow);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 14px;
    }

    header {
      padding: 1.1rem 1.25rem 1rem;
      border-bottom: 1px solid var(--slate);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--snow);
    }

    .logo span { color: var(--gold); }

    .status-pill {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--sage-soft);
      border: 1px solid rgba(127,168,136,0.3);
      color: var(--sage);
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }

    .status-pill.off {
      background: rgba(200,60,60,0.1);
      border-color: rgba(200,60,60,0.3);
      color: #e07070;
    }

    section { padding: 1.1rem 1.25rem; border-bottom: 1px solid var(--slate); }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.85rem;
    }

    .category-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .category-row:last-child { border-bottom: none; }

    .cat-info { display: flex; align-items: center; gap: 0.7rem; }

    .cat-icon {
      width: 28px; height: 28px;
      border-radius: 5px;
      display: grid;
      place-items: center;
      font-size: 0.8rem;
    }

    .cat-red { background: rgba(220,80,80,0.12); }
    .cat-orange { background: rgba(220,140,60,0.12); }
    .cat-purple { background: rgba(140,80,200,0.12); }

    .cat-name { font-size: 0.85rem; color: var(--snow); }
    .cat-count { font-size: 0.7rem; color: var(--mist); margin-top: 1px; }

    .toggle {
      position: relative;
      width: 36px; height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .track {
      position: absolute;
      inset: 0;
      background: var(--slate);
      border-radius: 10px;
      transition: background 0.3s;
    }

    .track::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: var(--mist);
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }

    .toggle input:checked + .track {
      background: var(--sage);
    }

    .toggle input:checked + .track::after {
      transform: translateX(16px);
      background: white;
    }

    /* Custom domains */
    .domain-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
      min-height: 24px;
    }

    .domain-tag {
      background: var(--slate);
      color: var(--silver);
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .domain-tag button {
      background: none;
      border: none;
      color: var(--mist);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      line-height: 1;
    }

    .domain-tag button:hover { color: var(--snow); }

    .add-row {
      display: flex;
      gap: 6px;
    }

    .domain-input {
      flex: 1;
      background: var(--ink);
      border: 1px solid var(--slate);
      color: var(--snow);
      padding: 6px 10px;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      border-radius: 2px;
      transition: border-color 0.2s;
    }

    .domain-input:focus { border-color: var(--gold-line); }
    .domain-input::placeholder { color: var(--slate); }

    .add-btn {
      background: var(--gold-soft);
      border: 1px solid var(--gold-line);
      color: var(--gold);
      padding: 6px 12px;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover { background: rgba(201,169,110,0.2); }

    /* Footer */
    footer {
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-stats {
      font-size: 0.7rem;
      color: var(--mist);
    }

    .footer-link {
      font-size: 0.7rem;
      color: var(--mist);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-link:hover { color: var(--snow); }

    .empty-state {
      font-size: 0.75rem;
      color: var(--slate);
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Rhythm<span>.</span></div>
  <div class="status-pill" id="statusPill">Active</div>
</header>

<section>
  <div class="section-label">Categories</div>

  <div class="category-row">
    <div class="cat-info">
      <div class="cat-icon cat-red">🔞</div>
      <div>
        <div class="cat-name">Pornography</div>
        <div class="cat-count">130+ major sites</div>
      </div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="togglePorn" checked />
      <span class="track"></span>
    </label>
  </div>

  <div class="category-row">
    <div class="cat-info">
      <div class="cat-icon cat-orange">🎰</div>
      <div>
        <div class="cat-name">Gambling / Betting</div>
        <div class="cat-count">40+ sites (Betika, SportPesa…)</div>
      </div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggleGambling" checked />
      <span class="track"></span>
    </label>
  </div>

</section>

<section>
  <div class="section-label">Custom sites</div>

  <div class="domain-tags" id="domainTags">
    <span class="empty-state" id="emptyMsg">No custom sites added yet</span>
  </div>

  <div class="add-row">
    <input class="domain-input" id="domainInput" type="text" placeholder="e.g. example.com" />
    <button class="add-btn" id="addBtn">+ Block</button>
  </div>
</section>

<footer>
  <div class="footer-stats" id="footerStats">Protecting your focus</div>
  <a class="footer-link" href="https://getrhythm.app" target="_blank">getrhythm.app</a>
</footer>

<script src="popup.js"></script>
</body>
</html>
